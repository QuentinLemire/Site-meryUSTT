<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mery US TT</title>
    <link rel="stylesheet" href="../assets/css/contact.css">
    <script src="../assets/js/page.js"></script>
    <script src="../assets/js/contact.js"></script>
</head>
<body>

    <div class="Logo-section">
        <a href="accueil.html">
            <img src="../pages/image/MeryBlanc.png" alt="Logo club">
        </a>
    </div>

    <div class="contact-container">
        <h2>Contactez-nous</h2>
        <form id="contact-form">
            <label for="contact-email">Adresse e-mail :</label>
            <input type="email" id="contact-email" name="contact-email" placeholder="Votre adresse e-mail" required>
    
            <label for="contact-message">Message :</label>
            <textarea id="contact-message" name="contact-message" placeholder="Votre message" required></textarea>
    
            <button type="submit">Envoyer</button>
        </form>
        <p id="contact-confirmation"></p>
    </div>
    
</body>
</html>
