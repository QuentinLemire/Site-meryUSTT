<!DOCTYPE html>
<html lang="fr"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Propos - Mery US TT</title>
    <link rel="stylesheet" href="../assets/css/a_propos.css">
    <script src="../assets/js/page.js"></script>
    <script src="../assets/js/a_propos.js"></script>
</head>
<body>
    
    <div class="Logo-section">
        <a href="accueil.html">
            <img src="../pages/image/MeryBlanc.png" alt="Logo club">
        </a>
    </div>

    <div class="container">
    <h1>À propos du club</h1>

    <section id="creneaux" class="section">
        <h2>Planning des entraînements</h2>
        
        <div class="planning-legend">
            <span class="legend-item creneau-jeune">Jeunes</span>
            <span class="legend-item creneau-adulte">Adultes</span>
            <span class="legend-item creneau-libre">Libre</span>
        </div>

        <div class="planning-wrapper">
            <!-- Colonne horaires -->
            <div class="planning-hours">
                <!-- Généré en JS (10h à 23h30) -->
            </div>
    
            <!-- Grille principale -->
            <div class="planning-grid" id="planning-grille">
                <!-- Colonnes des jours + créneaux générés par JS -->
            </div>
        </div>
    </section>

    <!-- Bureau -->
    <section id="bureau" class="section">
        <h2>Le bureau du club</h2>
        <div id="cartes-bureau" class="bureau-container">
            <!-- Cartes remplies dynamiquement -->
        </div>
    </section>

    <!-- Infos pratiques -->
    <section id="infos-pratiques" class="section">
        <h2>Informations pratiques</h2>
        <ul id="infos-dynamiques">
            <!-- Rempli dynamiquement -->
        </ul>
    </section>

</div>
</body>
</html>
